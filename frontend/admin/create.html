<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Receita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">
  <div class="mx-auto max-w-lg px-4 py-10">
    <div class="mb-8 rounded-3xl bg-white p-8 shadow-sm">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold text-slate-900">Nova Receita</h1>
          <p class="text-slate-500">Preencha os dados e salve uma nova receita.</p>
        </div>
        <button onclick="logout()" class="rounded-2xl bg-orange-500 px-4 py-2 text-white hover:bg-orange-600">Sair</button>
      </div>

      <div class="mt-8 grid gap-4">
        <label class="block text-sm font-medium text-slate-700">Título</label>
        <input id="title" type="text" placeholder="Ex: Bolo de Cenoura" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-orange-400 focus:outline-none" />

        <label class="block text-sm font-medium text-slate-700">Imagem URL</label>
        <input id="img" type="url" placeholder="https://..." class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-orange-400 focus:outline-none" />

        <label class="block text-sm font-medium text-slate-700">Descrição</label>
        <textarea id="description" rows="4" placeholder="Descrição da receita" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-orange-400 focus:outline-none"></textarea>

        <button onclick="createRecipe()" class="mt-4 w-full rounded-2xl bg-green-500 px-5 py-3 text-white shadow hover:bg-green-600">Salvar Receita</button>
      </div>
    </div>
  </div>

  <script src="../assets/admin.js"></script>
</body>
</html>
