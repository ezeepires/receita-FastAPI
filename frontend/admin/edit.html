<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Receita - NSL Receitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .gradient-text { background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-orange-50 to-slate-100 min-h-screen flex flex-col">
  <header class="bg-white/80 backdrop-blur-md shadow-sm flex-none">
    <div class="mx-auto max-w-lg px-4 py-5">
      <div class="flex items-center justify-between">
        <a href="dashboard.html" class="flex items-center gap-2 text-slate-500 hover:text-orange-500 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          Voltar
        </a>
        <button onclick="logout()" class="rounded-full bg-slate-100 px-4 py-2 text-slate-600 hover:bg-slate-200 transition-all">Sair</button>
      </div>
    </div>
  </header>

  <main class="flex-1 w-full">
    <div class="mx-auto max-w-lg px-4 py-8">
      <div class="rounded-3xl bg-white/80 backdrop-blur-sm p-8 shadow-xl border border-slate-100">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-slate-800">Editar Receita</h1>
          <p class="text-slate-500 text-sm mt-1">Atualize os dados da receita</p>
        </div>

        <div class="grid gap-5">
          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Título</label>
            <input id="title" type="text" placeholder="Ex: Bolo de Cenoura"
              class="w-full rounded-2xl border border-slate-200 bg-white/70 px-4 py-3 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none transition-all" />
          </div>

          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Imagem</label>
            <input id="image" type="file" accept="image/*"
              class="w-full rounded-2xl border border-slate-200 bg-white/70 px-4 py-3 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none transition-all file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100" />
            <p class="text-xs text-slate-400 mt-1">Deixe vazio para manter a imagem atual</p>
          </div>

          <div>
            <label class="block mb-2 text-sm font-medium text-slate-700">Descrição</label>
            <textarea id="description" rows="5" placeholder="Descrição da receita..."
              class="w-full rounded-2xl border border-slate-200 bg-white/70 px-4 py-3 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none transition-all resize-none"></textarea>
          </div>

          <button onclick="updateRecipe()"
            class="mt-2 w-full rounded-2xl bg-gradient-to-r from-orange-500 to-orange-600 px-5 py-3 text-white font-medium shadow-lg shadow-orange-500/30 hover:shadow-xl hover:shadow-orange-500/40 transition-all">
            Atualizar Receita
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="mt-auto bg-white/50 backdrop-blur-sm border-t border-slate-200/50 py-4">
    <div class="mx-auto max-w-lg px-4 text-center">
      <p class="text-slate-500 text-sm">© Desenvolvido por <a href="https://github.com/ezeepires" target="_blank" class="text-orange-500 hover:underline">Ezequiel Pires</a></p>
    </div>
  </footer>

  <script src="../assets/admin.js"></script>
</body>
</html>
