<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex min-h-screen items-center justify-center">
  <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-md">
    <h1 class="text-3xl font-bold text-slate-900 mb-6 text-center">Admin Login</h1>

    <label class="block mb-3 text-sm font-medium text-slate-700">Usuário</label>
    <input id="user" type="text" placeholder="Digite seu usuário"
      class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-orange-400 focus:outline-none" />

    <label class="block mt-4 mb-3 text-sm font-medium text-slate-700">Senha</label>
    <input id="pass" type="password" placeholder="Digite sua senha"
      class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 focus:border-orange-400 focus:outline-none" />

    <button onclick="login()"
      class="mt-6 w-full rounded-2xl bg-orange-500 px-5 py-3 text-white shadow-sm hover:bg-orange-600">
      Entrar
    </button>
  </div>

  <script src="../assets/admin.js"></script>
</body>
</html>
