<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - NSL Receitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .gradient-text { background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-orange-50 to-slate-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold gradient-text">NSL Receitas</h1>
      <p class="text-slate-500 mt-2">Área Administrativa</p>
    </div>

    <div class="rounded-3xl bg-white/80 backdrop-blur-sm p-8 shadow-xl border border-slate-100">
      <h2 class="text-xl font-semibold text-slate-800 mb-6 text-center">Entrar</h2>

      <label class="block mb-2 text-sm font-medium text-slate-700">Usuário</label>
      <input id="user" type="text" placeholder="Digite seu usuário"
        class="w-full rounded-2xl border border-slate-200 bg-white/70 px-4 py-3 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none transition-all" />

      <label class="block mt-5 mb-2 text-sm font-medium text-slate-700">Senha</label>
      <input id="pass" type="password" placeholder="Digite sua senha"
        class="w-full rounded-2xl border border-slate-200 bg-white/70 px-4 py-3 focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none transition-all" />

      <button onclick="login()"
        class="mt-6 w-full rounded-2xl bg-gradient-to-r from-orange-500 to-orange-600 px-5 py-3 text-white font-medium shadow-lg shadow-orange-500/30 hover:shadow-xl hover:shadow-orange-500/40 transition-all">
        Entrar
      </button>
      
      <div class="mt-6 text-center">
        <a href="../public/index.html" class="text-sm text-slate-500 hover:text-orange-500">← Voltar ao site</a>
      </div>
    </div>
  </div>

  <script src="../assets/admin.js"></script>
</body>
</html>
