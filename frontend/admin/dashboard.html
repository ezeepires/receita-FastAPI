<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">
  <header class="bg-orange-500 text-white shadow-sm">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-5">
      <div>
        <h1 class="text-2xl font-bold">Painel Admin</h1>
        <p class="text-orange-100">Gerencie receitas e atualize o catálogo.</p>
      </div>
      <button onclick="logout()" class="rounded-2xl bg-white px-4 py-2 text-orange-600 shadow-sm hover:bg-orange-50">Sair</button>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-8">
      <h2 class="text-xl font-semibold text-slate-900">Receitas cadastradas</h2>
      <a href="create.html" class="inline-flex items-center justify-center rounded-2xl bg-green-500 px-5 py-3 text-sm font-semibold text-white shadow hover:bg-green-600">+ Nova Receita</a>
    </div>

    <div id="list" class="grid gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>
  </main>

  <script src="../assets/admin.js"></script>
</body>
</html>
