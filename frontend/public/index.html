<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">
  <header class="bg-orange-500 text-white py-8 shadow-sm">
    <div class="max-w-6xl mx-auto px-4">
      <h1 class="text-4xl font-extrabold">NSL Receitas</h1>
      <p class="mt-2 text-orange-100 max-w-2xl">Explore receitas deliciosas e compre direto pelo WhatsApp.</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <section class="mb-8 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <input id="search" type="search"
        class="w-full rounded-3xl border border-slate-200 bg-white px-5 py-4 shadow-sm focus:border-orange-400 focus:ring-2 focus:ring-orange-200"
        placeholder="Buscar receita..."
      />
      <a href="../admin/login.html" class="inline-flex items-center justify-center rounded-full bg-orange-500 px-6 py-3 text-sm font-semibold text-white shadow hover:bg-orange-600">
        Área do Admin
      </a>
    </section>

    <section id="recipes" class="grid gap-6 sm:grid-cols-2 xl:grid-cols-3"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
