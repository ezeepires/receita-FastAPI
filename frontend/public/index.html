<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSL Receitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .recipe-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .recipe-card:hover { transform: translateY(-5px); }
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .gradient-text { background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-orange-50 to-slate-100 min-h-screen flex flex-col">
  <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 flex-none">
    <div class="max-w-6xl mx-auto px-4 py-5">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold gradient-text">NSL Receitas</h1>
          <p class="text-slate-500 text-sm mt-1">Descubra receitas deliciosas</p>
        </div>
        <a href="../admin/login.html" class="group flex items-center gap-2 bg-gradient-to-r from-orange-500 to-orange-600 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-lg shadow-orange-500/30 hover:shadow-xl hover:shadow-orange-500/40 transition-all duration-300 hover:-translate-y-0.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
          </svg>
          Admin
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 flex-1 w-full">
    <section class="mb-10">
      <div class="relative max-w-xl mx-auto">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <input id="search" type="search" placeholder="Buscar receitas..."
          class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200/60 bg-white/70 backdrop-blur-sm shadow-sm focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none transition-all duration-300"
        />
      </div>
    </section>

    <section id="recipes" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3"></section>
    
    <div id="empty-state" class="hidden text-center py-16">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-100 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
      </div>
      <h3 class="text-xl font-semibold text-slate-700 mb-2">Nenhuma receita encontrada</h3>
      <p class="text-slate-500">Tente buscar por outro termo</p>
    </div>
  </main>

  <footer class="mt-16 bg-white/50 backdrop-blur-sm border-t border-slate-200/50 py-6">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <p class="text-slate-600 text-sm">
        © Desenvolvido por 
        <a href="https://github.com/ezeepires" target="_blank" class="text-orange-500 font-medium hover:underline">Ezequiel Pires</a>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
